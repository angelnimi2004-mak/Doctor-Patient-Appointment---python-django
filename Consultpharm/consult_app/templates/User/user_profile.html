{% extends "User/header.html" %}
{% block content %}
{% load static %}

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10 col-sm-12">
      <div class="section-title text-start">
        <h1 class="display-6 mb-4">Profile</h1>
      </div>
      <div class="card shadow-lg border-light rounded-3 mt-5">
        <div class="card-header text-center bg-info text-white">
        </div>
        <div class="card-body">
          {% if messages %}
          <div class="alert-container">
            {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
              <strong>Success!</strong> {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
          </div>
          {% endif %}

          <form action="{% url 'profile' %}" method="post" id="myform" enctype="multipart/form-data"
            onsubmit="return validateProfileForm()">
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-md-6">
                <input type="hidden" value="{{ data.user_id }}" name="user">
                <div class="form-floating">
                  <label for="name">Name</label>
                  <input type="text" id="name" class="form-control" name="Name" value="{{ data.Name }}"
                    placeholder="Name" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <label for="phone">Phone Number</label>
                  <input type="text" id="phone" class="form-control" name="phone_number" placeholder="Phone Number"
                    value="{{ data.phone_number }}" required>
                  <div id="phoneError" class="text-danger"></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating mt-3">
                  <label for="email">E-mail</label>
                  <input type="email" id="email" class="form-control" value="{{ data.Email }}" name="Email"
                    placeholder="E-mail" required>
                  <div id="emailError" class="text-danger"></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating mt-3">
                  <label for="address">Address</label>
                  <textarea id="address" name="Address" class="form-control" placeholder="Address" rows="2"
                    required>{{ data.Address }}</textarea>
                </div>
              </div>
            </div>
            <div class="text-center mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Update</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function validateProfileForm() {
    let isValid = true;

    const phone = document.getElementById('phone').value;
    const phoneError = document.getElementById('phoneError');
    phoneError.textContent = '';
    if (!/^[6789]\d{9}$/.test(phone)) {
      phoneError.textContent = 'Phone number must be 10 digits and start with 6, 7, 8, or 9.';
      isValid = false;
    }

    const email = document.getElementById('email').value;
    const emailError = document.getElementById('emailError');
    emailError.textContent = '';
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      emailError.textContent = 'Please enter a valid email address. (example@gmail.com)';
      isValid = false;
    }

    return isValid; // Prevent form submission if validation fails
  }
</script>

{% endblock %}
