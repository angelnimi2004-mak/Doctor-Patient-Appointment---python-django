{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>Consultpharm-Doctor</title>
  <meta content="" name="description">
  <meta content="" name="keywords">

  <!-- Favicons -->
  <link href="{% static 'master/assets/img/favicon.png' %}" rel="icon">
  <link href="{% static 'assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.gstatic.com" rel="preconnect">
  <link
    href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i"
    rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="{% static 'master/assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'master/assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'master/assets/vendor/boxicons/css/boxicons.min.css' %}" rel="stylesheet">
  <link href="{% static 'master/assets/vendor/quill/quill.snow.css' %}" rel="stylesheet">
  <link href="{% static 'master/assets/vendor/quill/quill.bubble.css' %}" rel="stylesheet">
  <link href="{% static 'master/assets/vendor/remixicon/remixicon.css' %}" rel="stylesheet">
  <link href="{% static 'master/assets/vendor/simple-datatables/style.css' %}" rel="stylesheet">

  <!-- Template Main CSS File -->
  <link href="{% static 'master/assets/css/style.css' %}" rel="stylesheet">



</head>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="header fixed-top d-flex align-items-center ">

    <div class="d-flex align-items-center justify-content-between">
    
        <h2><i class="bi bi-person-circle"></i> DOCTOR </h2>

        <span class="d-none d-lg-block">  </span>
    
      <i class="bi bi-list toggle-sidebar-btn"></i>
    </div><!-- End Logo -->



    <nav class="header-nav ms-auto">
      <ul class="d-flex align-items-center">

        <li class="nav-item d-block d-lg-none">
          <a class="nav-link nav-icon search-bar-toggle " href="#">
            <i class="bi bi-search"></i>
          </a>
        </li><!-- End Search Icon-->

        <li class="nav-item">
          <a class="nav-link nav-icon"href="{% url 'admin_logout' %}" aria-label="Logout"
          onclick="return confirm('are you sure you want to logout?');">
            <i class="bi bi-box-arrow-right"></i>

          </a><!-- End Logout Icon -->
        </li><!-- End Logout Nav -->






      </ul>
    </nav><!-- End Icons Navigation -->

  </header><!-- End Header -->

  <!-- ======= Sidebar ======= -->
  <aside id="sidebar" class="sidebar">

    <ul class="sidebar-nav" id="sidebar-nav">

      <li class="nav-item">
        <a class="nav-link collapsed" href="{% url 'doctor_home' %}">
          <i class="bi bi-grid"></i>
          <span>Dashboard</span>
        </a>
      </li><!-- End Dashboard Nav -->

      <li class="nav-item">
        <a class="nav-link collapsed" data-bs-target="#book" data-bs-toggle="collapse" href="#">
          <i class="bi bi-layout-text-window-reverse"></i><span>Consulatation</span><i
            class="bi bi-chevron-down ms-auto"></i>
        </a>
        <ul id="book" class="nav-content collapse " data-bs-parent="#sidebar-nav">

          <li>
            <a href="{% url 'view_problem' %}">
              <i class="bi bi-circle"></i><span>User query</span>
            </a>
          </li>
          <li>
            <a href="{% url 'completed_problem' %}">
              <i class="bi bi-circle"></i><span>completed Works</span>
            </a>
          </li>
        </ul>
      </li>





      <li class="nav-heading">Pages</li>


      <!-- End Profile Page Nav -->
      <li class="nav-item">

        <a class="nav-link collapsed" href="{% url 'dr_profile' %}">
          <i class="bi bi-person"></i>

          <span>Profile</span>
        </a>
      </li>





      <li class="nav-item btn btn-danger mt-4 ms-2">
        <a class="nav-link collapsed text-danger" href="{% url 'admin_logout' %}" aria-label="Logout"
          onclick="return confirm('are you sure you want to logout?');">
          <i class="bi bi-box-arrow-in-right"></i>
          <span class="text-danger fw-bold">Logout</span>
        </a>
      </li>
      <!-- End Login Page Nav -->



    </ul>

  </aside><!-- End Sidebar-->

  <main id="main" class="main">

    {% block content %}

    {% endblock content %}

  </main><!-- End #main -->



  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i
      class="bi bi-arrow-up-short"></i></a>

  <!-- Vendor JS Files -->
  <script src="{% static 'master/assets/vendor/apexcharts/apexcharts.min.js' %}"></script>
  <script src="{% static 'master/assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <script src="{% static 'master/assets/vendor/chart.js/chart.umd.js' %}"></script>
  <script src="{% static 'master/assets/vendor/echarts/echarts.min.js' %}"></script>
  <script src="{% static 'master/assets/vendor/quill/quill.js' %}"></script>
  <script src="{% static 'master/assets/vendor/simple-datatables/simple-datatables.js' %}"></script>
  <script src="{% static 'master/assets/vendor/tinymce/tinymce.min.js' %}"></script>
  <script src="{% static 'master/assets/vendor/php-email-form/validate.js' %}"></script>

  <!-- Template Main JS File -->
  <script src="{% static 'master/assets/js/main.js' %}"></script>



</body>

</html>
