{% extends "Master/header.html" %}
{% load static %}

{% block content %}


<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 col-sm-12">
            <div class="card shadow-lg border-light rounded-4">
                {% if messages %}
                <div id="messages-container">
                    {% for message in messages %}
                        <h6 class="alert alert-success p-2">{{ message }}</h6>
                    {% endfor %}
                </div>
                <script>
                    setTimeout(() => {
                        const container = document.getElementById('messages-container');
                        if (container) {
                            container.style.display = 'none';
                        }
                    }, 1500); 
                </script>
                {% endif %}
                <div class="card-header">
                    <h3 class="mb-2 mt-2 text-center">Register Here</h3>
                </div>
                <div class="card-body">
                    <form action="{% url 'doctor_action' %}" method="post" id="myform" enctype="multipart/form-data" onsubmit="return validateForm()">
                        {% csrf_token %}
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="text" id="name" class="form-control" name="name" placeholder="Name" required title="Please enter your name">
                                    <label for="name">Name</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="tel" id="phone" class="form-control" name="phone" placeholder="Phone Number" required>
                                    <label for="phone">Phone Number</label>
                                    <div id="phoneError" class="text-danger"></div>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="email" id="email" class="form-control" name="email" placeholder="E-mail" required>
                                    <label for="email">E-mail</label>
                                    <div id="emailError" class="text-danger"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="text" id="username" class="form-control" name="username" placeholder="Username" required>
                                    <label for="username">Username</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" id="password1" class="form-control" name="password" placeholder="Password" required minlength="4" title="Password must be at least 4 characters">
                                    <label for="password1">Password</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" id="password2" class="form-control" name="cpassword" placeholder="Confirm Password" required>
                                    <label for="password2">Confirm Password</label>
                                    <div id="passwordError" class="text-danger"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Department Dropdown -->
                        <div class="form-floating mb-3">
                            <select id="department" name="department" class="form-control" required>
                                <option value="" disabled selected>Select Department</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Dermatology">Dermatology</option>
                                <option value="General Surgery">General Surgery</option>
                                <option value="Radiology">Radiology</option>
                                <option value="Oncology">Oncology</option>
                                <option value="Gastroenterology">Gastroenterology</option>
                                <option value="Psychiatry">Psychiatry</option>
                            </select>
                            <label for="department">Department</label>
                        </div>

                        <div class="form-floating mb-3">
                            <textarea id="address" name="address" class="form-control" placeholder="address" rows="4" required></textarea>
                            <label for="address">Address</label>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Register</button>
                        </div>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
</div>

<script>
    function validateForm() {
        let isValid = true;

        // Phone validation
        const phone = document.getElementById('phone').value;
        const phoneError = document.getElementById('phoneError');
        phoneError.textContent = ''; 
        if (!/^[6789]\d{9}$/.test(phone)) {
            phoneError.textContent = 'Phone number must be 10 digits and start with 6, 7, 8, or 9.';
            isValid = false;
        }

        // Email validation
        const email = document.getElementById('email').value;
        const emailError = document.getElementById('emailError');
        emailError.textContent = '';
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            emailError.textContent = 'Please enter a valid email address. (example@gmail.com)';
            isValid = false;
        }

        const password1 = document.getElementById('password1').value;
        const password2 = document.getElementById('password2').value;
        const passwordError = document.getElementById('passwordError');
        passwordError.textContent = ''; 
        if (password1 !== password2) {
            passwordError.textContent = 'Passwords do not match.';
            isValid = false;
        }

        return isValid; 
    }
</script>
<style>
  
    .btn-primary {
        background-color: #28a745;
        border-color: #28a745;
        border-radius: 25px;
        padding: 10px 30px;
        font-size: 1.1rem;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        background-color: #218838;
        border-color: #1e7e34;
    }


</style>

{% endblock %}
